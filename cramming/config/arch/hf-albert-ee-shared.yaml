# ALBERT-style shared-parameter masked LM with sequence-level early exits.

architectures:
  - AlbertEarlyExitForMaskedLM
model_type: albert

embedding_size: 64
hidden_size: 256
num_hidden_layers: 16
num_hidden_groups: 1
inner_group_num: 1
num_attention_heads: 4
intermediate_size: 1024

# Number of Transformer-layer applications between exit heads.
exit_interval: 8

early_exit:
  enabled: true
  max_depth: 2
  min_depth: 1
  halt_threshold: 0.5
  aux_loss_weight: 0.5
  halt_loss_weight: 1.0
  ponder_kl_weight: 0.01
  halt_prior_lambda: 0.5
  inference_enabled: true
  fail_if_all_max: false

hidden_act: gelu_new
hidden_dropout_prob: 0.0
attention_probs_dropout_prob: 0.0
initializer_range: 0.02
layer_norm_eps: 1e-12
max_position_embeddings: 512
position_embedding_type: absolute
type_vocab_size: 2
classifier_dropout_prob: 0.1

pad_token_id: 0
bos_token_id: 2
eos_token_id: 3
