# ALBERT-style shared-parameter masked LM baseline.
#
# This is intended as the "shared weights without Recursive Refiner cycles"
# comparison. Override hidden_size, embedding_size, num_attention_heads,
# intermediate_size, and num_hidden_layers from scripts to match each RR tier.

architectures:
  - AlbertForMaskedLM
model_type: albert

embedding_size: 64
hidden_size: 256
num_hidden_layers: 16
num_hidden_groups: 1
inner_group_num: 1
num_attention_heads: 4
intermediate_size: 1024

hidden_act: gelu_new
hidden_dropout_prob: 0.0
attention_probs_dropout_prob: 0.0
initializer_range: 0.02
layer_norm_eps: 1e-12
max_position_embeddings: 512
position_embedding_type: absolute
type_vocab_size: 2
classifier_dropout_prob: 0.1

pad_token_id: 0
bos_token_id: 2
eos_token_id: 3
