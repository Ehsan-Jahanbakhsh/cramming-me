# TRM-style Recursive Refiner for masked language modeling.
#
# This reuses the Recursive Refiner stack and adds carried refinement,
# deep supervision, and a lightweight halt head.

architectures:
  - TRMForMaskedLM

# Core dimensions.
hidden_size: 512
num_attention_heads: 8
num_hidden_layers: 2

# Recursive Refiner schedule. H_cycles/L_cycles aliases are still accepted.
hi_cycles: 3
lo_cycles: 6
grad_last_cycle_only: true

# Repeated supervision / inference refinement.
deep_supervision_steps: 1
inference_steps: 1

# Halting.
halt_max_steps: 1
act_training: false
halt_exploration_prob: 0.0
q_halt_loss_weight: 0.5

# Recursive Refiner block settings.
expansion: 4.0
embed_factor: 1
pre_norm: true
rms_eps: 1e-5
rope_theta: 10000.0

# Optional prefix/conditioning tokens.
prefix_len: 0

# Special tokens.
pad_token_id: 0
bos_token_id: 1
eos_token_id: 2

# HF compatibility.
use_cache: false
max_position_embeddings: 512
