type: MuonWithAuxAdamW

# Auxiliary AdamW settings (applied to non-hidden params such as embeddings, heads, norms, biases).
lr: 0.0005
betas:
  - 0.9
  - 0.98
eps: 1e-6
weight_decay: 0.01

fused: ""

muon_lr: 0.02
muon_weight_decay: 0.01
muon_momentum: 0.95
muon_nesterov: True
muon_ns_steps: 5
muon_eps: 1e-7
muon_adjust_lr_fn: ""

muon_min_ndim: 2
muon_exclude_name_substrings:
  - embeddings
  - embedding
  - embed
  - word_embeddings
  - position_embeddings
  - pos_embedding
  - lm_head
  - cls
  - classifier