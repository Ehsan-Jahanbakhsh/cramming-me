type: MuonWithAuxAdamW

# Auxiliary AdamW settings (applied to non-hidden params such as embeddings, heads, norms, biases).
lr: 0.0005
betas:
  - 0.9
  - 0.98
eps: 1e-12
weight_decay: 0.1

# Optional (PyTorch-dependent): fused AdamW.
fused: ""

# Muon settings (applied to selected hidden 2D weight matrices).
# A common starting point is a substantially larger LR for Muon than for AdamW.
muon_lr: 0.02
muon_weight_decay: 0.01
muon_momentum: 0.95
muon_nesterov: True
muon_ns_steps: 5
muon_eps: 1e-7
muon_ns_coefficients:

# If set, passed through to torch.optim.Muon(adjust_lr_fn=...).
# Valid values are defined by PyTorch; leaving this empty uses Muon's default.
muon_adjust_lr_fn: ""

# Parameter selection heuristics.
# Muon candidates are parameters with muon_min_ndim <= ndim <= muon_max_ndim
# whose *name* does NOT contain any of these substrings. Set muon_max_ndim to
# null to allow higher-rank tensors.
muon_min_ndim: 2
muon_max_ndim: 2
muon_exclude_name_substrings:
  - embeddings
  - embedding
  - embed
  - word_embeddings
  - position_embeddings
  - pos_embedding
  - lm_head
  - q_head
  - head
  - cls
  - classifier
  - decoder
  - pooler
  - score
