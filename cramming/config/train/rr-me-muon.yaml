# Basic hyperparameter for normal BERT pretraining
# working hard here to separate "impl" implementation details and "train" hyperparameters

name: rr-me-muon

defaults:
  - optim: muon
  - optim_mod: disabled

limited_decay_keys: [bias, LayerNorm.bias, LayerNorm.weight, norm] # no weight decay for these layers

optim:
  lr: 8e-4
  muon_lr: 0.008

# Steps:
warmup_steps: 1_000
cooldown_steps: 0
steps: 1_500_000 # these are microbatch steps # This is an upper limit that is usually never reached
scheduler: budget-cosine-decay

# Training settings:
microbatch_size: 64
batch_size: 4096
batch_size_ramp: 0.1 # in percentage points, i.e. training reaches the target 8192 at 60% of the total budget.

gradient_clipping:
pretrain_in_train_mode: False # default BERT trains with dropout layers

objective:
  name: masked-lm
  mlm_probability: 0.15
  use_80_20_rule: True
  disable_mlm: False
  token_drop: 0.0
reverse_dataset_order: False

budget: ${budget}
